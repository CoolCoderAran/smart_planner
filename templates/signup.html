<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Smart Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">

    <div class="auth-container">

        <h1 class="auth-title">Create Your Account</h1>
        <p class="auth-subtitle">Start organizing your work smarter</p>

        <form action="/signup" method="POST" class="auth-form">

            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create password (6+ chars)" required>

            <button type="submit" class="auth-btn">Sign Up</button>

        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Login</a>
        </p>

    </div>

</body>
</html>
