<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Mode</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='study.css') }}">
</head>
<body>

<nav class="topbar">
    <h1>Study Mode</h1>

    <a href="/dashboard" class="back-btn">
        Dashboard
    </a>
</nav>

<div class="container">

    <div class="card">

        <h2>Study Session</h2>

        <label>Timer Mode</label>

        <select id="modeSelect">
            <option value="pomodoro">Pomodoro (25/5)</option>
            <option value="deepwork">Deep Work (90/15)</option>
            <option value="quickburst">Quick Burst (15/3)</option>
            <option value="examcrunch">Exam Crunch (50/10)</option>
            <option value="custom">Custom</option>
        </select>

        <div id="customSettings" style="display:none">

            <label>Focus Minutes</label>
            <input type="number" id="customFocus" value="30">

            <label>Break Minutes</label>
            <input type="number" id="customBreak" value="5">

        </div>

        <label>Task</label>

        <select id="taskSelect">

            {% for task in tasks %}
            <option value="{{ task[1] }}">
                {{ task[1] }}
            </option>
            {% endfor %}

        </select>

    </div>

    <div class="timer-card">

        <h3 id="phaseLabel">
            Focus Time
        </h3>

        <div id="timerDisplay">
            25:00
        </div>

        <div class="controls">

            <button onclick="startTimer()">
                Start
            </button>

            <button onclick="pauseTimer()">
                Pause
            </button>

            <button onclick="resumeTimer()">
                Resume
            </button>

            <button onclick="resetTimer()">
                Reset
            </button>

        </div>

    </div>

    <div class="stats-card">

        <h2>Statistics</h2>

        <div class="stat">
            Today's Minutes:
            <span id="todayMinutes">0</span>
        </div>

        <div class="stat">
            Weekly Minutes:
            <span id="weeklyMinutes">0</span>
        </div>

        <div class="stat">
            Sessions:
            <span id="totalSessions">0</span>
        </div>

        <div class="stat">
            Total Minutes:
            <span id="totalMinutes">0</span>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='study.js') }}"></script>

</body>
</html>
